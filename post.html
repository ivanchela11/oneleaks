<!DOCTYPE html>

<body>
<div class="md3-app">

  <header class="top-app-bar">
    <a class="top-app-bar__brand" href="index.html">

      <span class="top-app-bar__title">OneLeaks Forum<small>Утечки OnePlus из первых рук</small></span>
    </a>
    <button class="icon-btn" id="theme-toggle" aria-label="Сменить тему">

  <main class="md3-content">

    </div>

  <footer class="site-footer">

  <nav class="bottom-nav" aria-label="Основная навигация">
    <a href="index.html">
      <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>

    <a href="index.html#post-grid">

      Ленты
    </a>
  </nav>
</div>

<button class="fab" id="fab-top" aria-label="Наверх">
  <svg viewBox="0 0 24 24"><path d="M12 6l-8 8 1.41 1.41L11 9.83V20h2V9.83l5.59 5.58L20 14z"/></svg>
</button>

<script src="data/posts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
<script src="js/app.js"></script>
